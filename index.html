  <style>
    :root {
      --primary: #0A3D62;
      --primary-light: #1a5a8a;
      --secondary: #1ABC9C;
      --secondary-dark: #0e9c82;
      --bg: #F8FAFC;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(10, 61, 98, 0.10);
      --shadow-lg: 0 12px 48px rgba(10, 61, 98, 0.15);
      --radius: 16px;
      --radius-sm: 10px;
    }

    [data-theme='dark'] {
      --bg: #0f1923;
      --text: #e8ecf1;
      --text-light: #8a9bb5;
      --white: #162a3a;
      --card-bg: #162a3a;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 12px 48px rgba(0, 0, 0, 0.4);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Open Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    h1,
    h2,
    h3,
    h4,
    h5 {
      font-family: 'Poppins', sans-serif;
    }

    /* ─── NAVBAR ─── */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
      transition: box-shadow 0.3s, background 0.3s;
    }

    [data-theme='dark'] .navbar {
      background: rgba(15, 25, 35, 0.95);
    }

    .navbar.scrolled {
      box-shadow: var(--shadow);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--primary);
    }

    .logo-text span {
      color: var(--secondary);
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--secondary);
    }

    .nav-cta {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      border: none;
      border-radius: 50px;
      padding: 10px 24px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(10, 61, 98, 0.3);
    }

    .hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }

    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--primary);
      margin: 5px 0;
      transition: 0.3s;
    }

    .mobile-menu {
      display: none;
      position: fixed;
      top: 72px;
      left: 0;
      right: 0;
      background: var(--white);
      padding: 20px 5%;
      box-shadow: var(--shadow);
      z-index: 999;
      flex-direction: column;
      gap: 16px;
    }

    .mobile-menu.open {
      display: flex;
    }

    .mobile-menu a {
      text-decoration: none;
      color: var(--text);
      font-weight: 500;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    /* ─── HERO ─── */
    .hero {
      min-height: 100vh;
      background: linear-gradient(135deg, #0A3D62 0%, #0d4f7c 50%, #1a6694 100%);
      display: flex;
      align-items: center;
      padding: 100px 5% 60px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(26, 188, 156, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero-content {
      max-width: 600px;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(26, 188, 156, 0.2);
      border: 1px solid rgba(26, 188, 156, 0.4);
      color: #1ABC9C;
      border-radius: 50px;
      padding: 6px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 28px;
      font-family: 'Poppins', sans-serif;
    }

    .hero h1 {
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      font-weight: 800;
      color: white;
      line-height: 1.15;
      margin-bottom: 20px;
    }

    .hero h1 span {
      color: #1ABC9C;
    }

    .hero p {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.05rem;
      line-height: 1.8;
      margin-bottom: 36px;
      max-width: 480px;
    }

    .hero-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, #1ABC9C, #0e9c82);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 32px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(26, 188, 156, 0.4);
    }

    .btn-outline {
      background: transparent;
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 50px;
      padding: 12px 30px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: white;
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      margin-top: 48px;
      flex-wrap: wrap;
    }

    .stat {
      text-align: left;
    }

    .stat-num {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 1.8rem;
      color: white;
    }

    .stat-label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.8rem;
      margin-top: 2px;
    }

    /* ─── SECTIONS ─── */

    .section-header {

    .section-tag {

      text-transform: uppercase;
      margin-bottom: 14px;
      font-family: 'Poppins', sans-serif;
    }

    .section-title {
      font-size: clamp(1.8rem, 3.5vw, 2.6rem);
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 16px;
    }

    .section-subtitle {
      color: var(--text-light);
      font-size: 1rem;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.8;
    }

    /* ─── ABOUT ─── */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .about-visual {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      border-radius: 24px;
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 420px;
      position: relative;
      overflow: hidden;
    }

    .about-visual::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 200px;
      height: 200px;
      background: rgba(26, 188, 156, 0.15);
      border-radius: 50%;
    }

    .doc-avatar {

      height: 110px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      border: 3px solid rgba(255, 255, 255, 0.3);

      align-items: center;
      justify-content: center;
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .about-visual h3 {
      color: white;
      font-size: 1.4rem;
      font-weight: 700;
    }

    .about-visual p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .about-badge {
      background: rgba(26, 188, 156, 0.2);
      border: 1px solid rgba(26, 188, 156, 0.4);
      color: #1ABC9C;
      border-radius: 50px;
      padding: 5px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-top: 16px;
    }

    .about-content h2 {
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 16px;
    }

    .about-content p {
      color: var(--text-light);
      line-height: 1.9;
      margin-bottom: 16px;
    }

    .about-features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 28px;
    }

    .about-feat {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--primary);
    }

    .feat-icon {
      font-size: 1.1rem;
    }

    /* ─── SERVICES ─── */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .service-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 32px 28px;
      border: 1px solid var(--border);
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      cursor: default;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: var(--secondary);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(10, 61, 98, 0.08), rgba(26, 188, 156, 0.12));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 20px;
      transition: background 0.3s;
    }

    .service-card:hover .service-icon {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
    }

    .service-card h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 10px;
    }

    .service-card p {
      color: var(--text-light);
      font-size: 0.88rem;
      line-height: 1.7;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--secondary);
      font-weight: 600;
      font-size: 0.85rem;
      margin-top: 16px;
      transition: gap 0.2s;
      text-decoration: none;
    }

    .service-card:hover .service-link {
      gap: 10px;
    }

    /* ─── TESTIMONIALS ─── */
    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .testimonial-card {
      background: white;
      border-radius: var(--radius);
      padding: 32px 28px;
      border: 1px solid var(--border);
      position: relative;
    }

    .testimonial-card::before {
      content: '"';
      position: absolute;
      top: 16px;
      right: 24px;
      font-size: 5rem;
      color: rgba(26, 188, 156, 0.1);
      font-family: Georgia, serif;
      line-height: 1;
    }

    .stars {
      color: #f59e0b;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    .testimonial-card p {
      color: var(--text);
      font-size: 0.93rem;
      line-height: 1.75;
      font-style: italic;
    }

    .testimonial-author {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
    }

    .author-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
      font-family: 'Poppins', sans-serif;
    }

    .author-name {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--primary);
    }

    .author-tag {
      color: var(--text-light);
      font-size: 0.78rem;
    }

    /* ─── APPOINTMENT ─── */
    .appointment-section {
      background: linear-gradient(135deg, var(--primary) 0%, #0d4f7c 100%);
      padding: 90px 5%;
    }

    .appointment-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: start;
    }

    .apt-info h2 {
      color: white;
      font-size: 2rem;
      margin-bottom: 16px;
    }

    .apt-info p {
      color: rgba(255, 255, 255, 0.75);
      line-height: 1.8;
      margin-bottom: 28px;
    }

    .apt-info-items {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .apt-info-item {
      display: flex;
      align-items: center;
      gap: 14px;
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.9rem;
    }

    .apt-info-item span:first-child {
      font-size: 1.2rem;
    }

    .apt-form {
      background: white;
      border-radius: 24px;
      padding: 40px 36px;
      box-shadow: var(--shadow-lg);
    }

    .apt-form h3 {
      font-size: 1.3rem;
      color: var(--primary);
      margin-bottom: 28px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      margin-bottom: 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--primary);
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-family: 'Open Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      width: 100%;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px rgba(26, 188, 156, 0.12);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 4px;
    }

    .form-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(26, 188, 156, 0.35);
    }

    .form-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .success-msg {
      background: rgba(26, 188, 156, 0.1);
      border: 1px solid var(--secondary);
      border-radius: var(--radius-sm);
      padding: 16px;
      text-align: center;
      color: var(--secondary-dark);
      font-weight: 600;
      margin-top: 16px;
    }

    /* ─── CONTACT ─── */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 48px;
      align-items: start;
    }

    .contact-details {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      background: white;
      border-radius: var(--radius);
      padding: 20px 24px;
      border: 1px solid var(--border);
    }

    .contact-icon {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      background: linear-gradient(135deg, rgba(10, 61, 98, 0.08), rgba(26, 188, 156, 0.1));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .contact-item h4 {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;

    .contact-item p,

      font-size: 0.88rem;
      text-decoration: none;
      line-height: 1.6;
    }

    .contact-item a:hover {

    }

    .map-container {
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .map-container iframe {
      display: block;
    }

    /* ─── FOOTER ─── */
    footer {
      background: var(--primary);
      color: rgba(255, 255, 255, 0.75);
      padding: 60px 5% 30px;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 40px;
      margin-bottom: 48px;
    }

    .footer-brand {
      max-width: 280px;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .footer-logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .footer-logo-text {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      color: white;
    }

    .footer-brand p {
      font-size: 0.87rem;
      line-height: 1.8;
    }

    .footer-socials {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .social-btn {
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
      color: white;
    }

    .social-btn:hover {
      background: var(--secondary);
    }

    .footer-col h4 {
      color: white;
      font-size: 0.95rem;
      font-weight: 700;

    // ─── ABOUT ───
    function About() {
      return (
        <section className="section section-alt" id="about">
          <div className="about-grid">
            <div className="about-visual">
              <div className="doc-avatar">👩‍⚕️</div>

              <p>Lead Dentist & Founder</p>
              <div className="about-badge">🏆 Women-Owned Practice</div>

            </div>
            <div className="about-content">
              <div className="section-tag">About Us</div>
              <h2>Caring for Smiles in Padianallur & Beyond</h2>

                </div>
              </div>
            ))}
          </div>

      );
    }

    // ─── APPOINTMENT FORM ───
    function Appointment() {
      const [form, setForm] = useState({ name: '', phone: '', service: '', date: '', time: '', message: '' });
      const [status, setStatus] = useState(''); // 'loading' | 'success' | 'error'

      const SERVICES_LIST = ['Root Canal Treatment', 'Dental Implants', 'Braces & Orthodontics', 'Tooth Extraction', 'Cosmetic Dentistry', 'General Dentistry', 'Other / Consultation'];

      const handleChange = e => setForm(f => ({ ...f, [e.target.name]: e.target.value }));

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!form.name || !form.phone || !form.date) return;
        setStatus('loading');

        try {
          const { error } = await window.supabaseClient
            .from('appointments')
            .insert([{
              name: form.name,
              phone: form.phone,
              service: form.service || 'General Dentistry',
              date: form.date,
              time: form.time || 'Any time',
              message: form.message || '',
              status: 'pending'
            }]);

          if (error) throw error;

          setStatus('success');
          setForm({ name: '', phone: '', service: '', date: '', time: '', message: '' });
        } catch (error) {
          console.error('Booking error:', error.message);
          setStatus('error');
        }

        setTimeout(() => setStatus(''), 5000);
      };

      return (
        <section className="appointment-section" id="appointment">
          <div className="appointment-grid">
            <div className="apt-info">
              <div className="section-tag" style={{ background: 'rgba(26,188,156,0.2)', color: '#1ABC9C' }}>Book Now</div>

                <div className="apt-info-item"><span>📍</span><span>Service Rd, M.A.Nagar, Padianallur, Tamil Nadu 600052</span></div>
                <div className="apt-info-item"><span>📞</span><a href="tel:+919042636466" style={{ color: 'rgba(255,255,255,0.85)', textDecoration: 'none' }}>+91 90426 36466</a></div>
                <div className="apt-info-item"><span>🕐</span><span>Mon–Sat: 9:00 AM – 7:00 PM | Sun: By Appointment</span></div>
                <div className="apt-info-item"><span>⭐</span><span>5.0 Rated · 172 Google Reviews · Women-Owned</span></div>
              </div>
            </div>
            <div className="apt-form">
              <h3>📋 Request an Appointment</h3>
              <form onSubmit={handleSubmit}>
                <div className="form-row">
                  <div className="form-group">
                    <label>Full Name *</label>
                    <input type="text" name="name" value={form.name} onChange={handleChange} placeholder="Your name" required />
                  </div>
                  <div className="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" name="phone" value={form.phone} onChange={handleChange} placeholder="+91 XXXXX XXXXX" required />
                  </div>
                </div>
                <div className="form-group">
                  <label>Service Needed</label>
                  <select name="service" value={form.service} onChange={handleChange}>
                    <option value="">Select a service...</option>
                    {SERVICES_LIST.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                <div className="form-row">
                  <div className="form-group">
                    <label>Preferred Date *</label>
                    <input type="date" name="date" value={form.date} onChange={handleChange} min={new Date().toISOString().split('T')[0]} required />
                  </div>
                  <div className="form-group">
                    <label>Preferred Time</label>
                    <select name="time" value={form.time} onChange={handleChange}>
                      <option value="">Any time</option>
                      {['9:00 AM', '10:00 AM', '11:00 AM', '12:00 PM', '2:00 PM', '3:00 PM', '4:00 PM', '5:00 PM', '6:00 PM'].map(t => <option key={t} value={t}>{t}</option>)}
                    </select>
                  </div>
                </div>
                <div className="form-group">
                  <label>Message (optional)</label>
                  <textarea name="message" value={form.message} onChange={handleChange} placeholder="Describe your concern or any questions..." rows={3} />
                </div>
                <button type="submit" className="form-submit" disabled={status === 'loading'}>
                  {status === 'loading' ? '⏳ Submitting...' : '📅 Request Appointment'}
                </button>
              </form>
              {status === 'success' && <div className="success-msg">✅ Appointment requested successfully! We'll call you shortly to confirm.</div>}
              {status === 'error' && <div className="success-msg" style={{ borderColor: '#ef4444', color: '#ef4444', background: 'rgba(239,68,68,0.06)' }}>❌ Something went wrong. Please call us directly at +91 90426 36466.</div>}
            </div>
          </div>
        </section>
      );
    }

    // ─── CONTACT ───
    function Contact() {
      return (

      implants: ["🦷 Dental Implants at Thiru Dentistry are a permanent solution for missing teeth. Dr. Sivapriya uses the latest techniques for natural-looking, long-lasting results.\n\nWould you like to book a consultation?"],
      rootcanal: ["Root Canal Treatment is completely painless with modern techniques! 😊 We use advanced endodontic therapy to save infected teeth and relieve pain.\n\nDr. Sivapriya has extensive experience with root canals. Want to book an appointment?"],
      braces: ["We offer both traditional braces and modern aligner options to give you the perfect smile! 😁 Treatment duration varies based on your case.\n\nBook a free orthodontic consultation today!"],
      pain: ["We understand dental anxiety! 😌 Dr. Sivapriya and our team are known for their gentle, patient approach. All our procedures are designed to be as comfortable as possible.\n\nDon't let fear stop you from getting the care you need—we're here for you!"],

    };

    function detectIntent(msg) {
      const m = msg.toLowerCase();
      if (/(hi|hello|hey|namaste|good|greet)/i.test(m)) return 'greet';
      if (/(book|appoint|schedule|visit|consult|fix|slot)/i.test(m)) return 'book';
      if (/(hour|time|when|open|close|timing)/i.test(m)) return 'hours';
      if (/(address|where|location|map|find|direction|how to reach)/i.test(m)) return 'location';
      if (/(implant)/i.test(m)) return 'implants';
      if (/(root canal|rct|endodon)/i.test(m)) return 'rootcanal';
      if (/(brace|ortho|aligner|teeth straighten)/i.test(m)) return 'braces';
      if (/(pain|afraid|scared|anxious|fear|hurt)/i.test(m)) return 'pain';
      return 'default';
    }

    function Chatbot() {
      const [open, setOpen] = useState(false);
      const [messages, setMessages] = useState([
        { role: 'bot', text: "👋 Hi! Welcome to Thiru Dentistry! I'm here to help you.\n\nHow can I assist you today?", time: now() }
      ]);
      const [input, setInput] = useState('');
      const [typing, setTyping] = useState(false);
      const bottomRef = useRef();

      function now() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }

      useEffect(() => {
        if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior: 'smooth' });
      }, [messages, typing]);

      const sendMsg = async () => {
        if (!input.trim()) return;
        const userMsg = input.trim();
        setInput('');
        setMessages(m => [...m, { role: 'user', text: userMsg, time: now() }]);
        setTyping(true);
        await new Promise(r => setTimeout(r, 800 + Math.random() * 700));
        const intent = detectIntent(userMsg);
        const responses = CHATBOT_RESPONSES[intent] || CHATBOT_RESPONSES.default;
        const reply = responses[Math.floor(Math.random() * responses.length)];
        setTyping(false);
        setMessages(m => [...m, { role: 'bot', text: reply, time: now() }]);
      };

      const handleKey = e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
      };

      return (
        <>
          <div className={`chat-window ${open ? '' : 'hidden'}`}>
            <div className="chat-header">
              <div className="chat-avatar">🦷</div>
              <div className="chat-header-info">
                <h4>Thiru Dentistry</h4>
                <p><span className="chat-online" />AI Receptionist · Online</p>
              </div>
              <button className="chat-close" onClick={() => setOpen(false)}>✕</button>
            </div>
            <div className="chat-messages">
              {messages.map((m, i) => (
                <div key={i} className={`msg msg-${m.role}`}>
                  <div dangerouslySetInnerHTML={{ __html: m.text.replace(/\n/g, '<br/>') }} />
                  <div className="msg-time">{m.time}</div>
                </div>
              ))}
              {typing && (
                <div className="msg msg-bot">
                  <div className="typing-indicator">
                    <div className="typing-dot" /><div className="typing-dot" /><div className="typing-dot" />
                  </div>
                </div>
              )}
              <div ref={bottomRef} />
            </div>
            <div className="chat-input-area">
              <textarea
                className="chat-input" rows={1}
                placeholder="Type your message..."
                value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKey}
              />
              <button className="chat-send" onClick={sendMsg}>➤</button>
            </div>
          </div>
          <button className="chat-fab" onClick={() => setOpen(o => !o)} title="Chat with us">
            {open ? '✕' : '💬'}
          </button>
        </>
      );
    }
